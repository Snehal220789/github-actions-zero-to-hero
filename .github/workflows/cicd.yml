#This is the name of the workflow which will be displayed in actions
name: CICD

on:
  workflow_dispatch: 
    inputs:
      environments: 
        description: This is the environment where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from github"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker containers
        run: echo "docker container build"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the containet
        run: echo "Testing the container"
  deploy:
     if: inputs.environments == 'dev'
     needs: [build,test]    
     runs-on: ubuntu-latest
     steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
